version: 2

seeds:
    - name: olist_customers_dataset
      config:
        column_types:    # --> ADJUST DATA TYPE
            customer_id: string
            customer_unique_id: string
            customer_zip_code_prefix: string
            customer_city: string
            customer_state: string

      columns:
        - name: customer_id
          tests:
            - not_null
            - unique
            - dbt_utils.not_empty_string  # STRING CAN'T BE EMPTY e.g = ""
        - name: customer_unique_id
          tests: 
            - not_null
            - dbt_utils.not_empty_string
        - name: customer_zip_code_prefix
          tests:
            - not_null
            #- dbt_utils.expression_is_true:
            #    arguments:
            #      expression: "length(customer_zip_code_prefix) = 5"   # PANJANG LENGTH DARI KOLOM INI WAJIB 5
        - name: customer_city
          tests:
            - not_null
            - dbt_utils.not_empty_string
        - name: customer_state
          tests:
            - not_null
            - accepted_values:
                values: ['SP', 'RJ', 'MG', 'RS', 'PR', 'SC', 'BA', 'DF', 'ES', 'GO', 'PE', 'CE', 'PA', 'MT', 'MA', 'MS',
                         'PB', 'PI', 'RN', 'AL', 'SE', 'TO', 'RO', 'AM', 'AC', 'AP', 'RR']
            #- dbt_utils.expression_is_true:
            #    arguments:
            #      expression: "length(customer_state) = 2"  # PANJANG LENGTH KOLOM INI WAJIB 2
          

    
        
            
    